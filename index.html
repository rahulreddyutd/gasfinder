<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GasFinder — Live Gas Prices Near You</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛽</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b0c10;--surface:#13141a;--card:#1c1d26;--card2:#22232e;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
      --accent:#f5a623;--accent2:#ff6835;--green:#2ecf7b;--green2:#1a9958;
      --red:#ff5555;--blue:#4da6ff;--text:#eeeef5;--muted:#6e6e90;--muted2:#9898b8;
    }
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
    .page{max-width:520px;margin:0 auto;padding:0 16px 60px}
    .header{padding:40px 0 24px;position:relative}
    .eyebrow{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:8px}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;display:inline-block}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}
    h1{font-family:'Bebas Neue',cursive;font-size:64px;line-height:.88;letter-spacing:2px;background:linear-gradient(140deg,#fff 20%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header-sub{font-size:14px;color:var(--muted2);margin-top:10px}
    .deco{position:absolute;right:0;top:28px;font-size:72px;opacity:.07;pointer-events:none;user-select:none;animation:rock 3s ease-in-out infinite alternate}
    @keyframes rock{from{transform:rotate(-6deg)}to{transform:rotate(6deg)}}
    .config-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:22px;margin-bottom:20px}
    .cfg-sec{margin-bottom:18px}
    .cfg-sec:last-child{margin-bottom:0}
    .cfg-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .divider{height:1px;background:var(--border);margin:16px 0}

    /* Search box */
    .search-wrap{position:relative;margin-bottom:10px}
    .search-input{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 44px 12px 14px;outline:none;transition:border-color .15s}
    .search-input::placeholder{color:var(--muted)}
    .search-input:focus{border-color:var(--accent)}
    .search-go{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;padding:4px;color:var(--accent)}
    .loc-active{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid rgba(46,207,123,.25);border-radius:12px;padding:10px 14px}
    .loc-active-name{font-size:13px;font-weight:500;color:var(--green)}
    .loc-active-sub{font-size:11px;color:var(--muted);margin-top:1px}
    .loc-clear{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 4px;line-height:1}
    .loc-clear:hover{color:var(--red)}
    .btn-gps{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px 16px;border-radius:12px;border:1px solid var(--border2);background:var(--card2);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;margin-top:8px}
    .btn-gps:hover{border-color:var(--blue);color:var(--blue)}

    /* Suggestions dropdown */
    .suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card);border:1px solid var(--border2);border-radius:12px;z-index:100;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .suggestion-item{padding:11px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);transition:background .1s}
    .suggestion-item:last-child{border-bottom:none}
    .suggestion-item:hover{background:var(--card2)}
    .suggestion-main{font-weight:500;color:var(--text)}
    .suggestion-sub{font-size:11px;color:var(--muted);margin-top:2px}

    .chips{display:flex;gap:7px;flex-wrap:wrap}
    .chip{padding:7px 14px;border-radius:30px;border:1px solid var(--border2);background:var(--card);color:var(--muted2);cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
    .chip:hover{border-color:var(--accent);color:var(--accent)}
    .chip.r-on{border-color:var(--accent);color:var(--accent);background:rgba(245,166,35,.1)}
    .chip.f-on{border-color:var(--green);color:var(--green);background:rgba(46,207,123,.08)}
    .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 20px;border-radius:14px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;transition:all .2s}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 24px rgba(245,166,35,.25)}
    .btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 28px rgba(245,166,35,.38)}
    .btn-primary:active:not(:disabled){transform:translateY(0)}
    .btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
    .refresh-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:20px;font-size:12px;color:var(--muted2)}
    .refresh-bar.hidden{display:none}
    .ring-wrap{width:28px;height:28px;flex-shrink:0}
    .ring-wrap svg{transform:rotate(-90deg);display:block}
    .ring-bg{fill:none;stroke:var(--border2);stroke-width:3}
    .ring-prog{fill:none;stroke:var(--green);stroke-width:3;stroke-linecap:round;stroke-dasharray:69.1;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear}
    .refresh-info{flex:1}
    .countdown{font-weight:600;color:var(--text)}
    .btn-now{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--green);font-size:12px;font-weight:600;padding:6px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;flex-shrink:0}
    .btn-now:hover{background:rgba(46,207,123,.08)}
    .btn-now:disabled{opacity:.4;cursor:not-allowed}
    .loading{display:flex;flex-direction:column;align-items:center;padding:48px 0;gap:16px}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-msg{font-size:13px;color:var(--muted2);text-align:center;line-height:1.6}
    .err{background:rgba(255,85,85,.06);border:1px solid rgba(255,85,85,.2);border-radius:12px;padding:14px 16px;font-size:13px;color:#ff8080;margin-bottom:16px;line-height:1.6}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
    .scard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
    .sval{font-size:15px;font-weight:600}
    .slbl{font-size:10px;color:var(--muted);margin-top:3px}
    .sval.g{color:var(--green)}
    .sval.r{color:var(--red)}
    .best{background:linear-gradient(135deg,rgba(46,207,123,.09),rgba(46,207,123,.03));border:1px solid rgba(46,207,123,.25);border-radius:20px;padding:22px;margin-bottom:12px;position:relative;overflow:hidden}
    .best-badge{display:inline-flex;align-items:center;gap:5px;background:var(--green2);color:#fff;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:12px}
    .best-name{font-size:20px;font-weight:600;margin-bottom:3px}
    .best-addr{font-size:12px;color:var(--muted2);margin-bottom:16px}
    .best-price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:14px}
    .best-price{font-family:'Bebas Neue',cursive;font-size:58px;color:var(--green);line-height:1}
    .best-unit{font-size:13px;color:var(--muted2)}
    .best-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted2)}
    .list-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .list-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
    .stations{display:flex;flex-direction:column;gap:7px}
    .srow{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 16px;display:flex;align-items:center;gap:13px;transition:border-color .15s;animation:slideup .3s ease both}
    @keyframes slideup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .srow:hover{border-color:var(--border2)}
    .srank{font-family:'Bebas Neue',cursive;font-size:22px;color:var(--muted);min-width:22px;text-align:center}
    .sinfo{flex:1;min-width:0}
    .sname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .saddr{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .sdist{font-size:11px;color:var(--muted);margin-top:2px}
    .sprice{font-family:'Bebas Neue',cursive;font-size:30px;flex-shrink:0}
    .sprice.lo{color:var(--green)}.sprice.hi{color:var(--red)}.sprice.mid{color:var(--text)}
    .foot-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:11px;color:var(--muted)}
    .src-tag{border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600;background:rgba(46,207,123,.1);border:1px solid rgba(46,207,123,.3);color:var(--green)}
    .welcome{text-align:center;padding:40px 16px}
    .welcome-icon{font-size:60px;margin-bottom:16px}
    .welcome h2{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:1px;margin-bottom:8px}
    .welcome p{font-size:14px;color:var(--muted2);line-height:1.6;max-width:300px;margin:0 auto}
    .hidden{display:none!important}
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="eyebrow"><span class="live-dot"></span> Live Prices · Auto-Refresh</div>
    <h1>GAS<br>FINDER</h1>
    <p class="header-sub">Search any US city or ZIP — real EIA government prices</p>
    <div class="deco">⛽</div>
  </div>

  <div class="config-card">

    <!-- Location Search -->
    <div class="cfg-sec">
      <div class="cfg-label">📍 Location</div>

      <!-- Active location display -->
      <div id="loc-active" class="loc-active hidden">
        <span style="font-size:16px">📍</span>
        <div>
          <div class="loc-active-name" id="loc-active-name"></div>
          <div class="loc-active-sub" id="loc-active-sub"></div>
        </div>
        <button class="loc-clear" onclick="clearLocation()" title="Change location">✕</button>
      </div>

      <!-- Search input -->
      <div class="search-wrap" id="search-wrap">
        <input class="search-input" id="search-input"
          type="text"
          placeholder="Enter city, state or ZIP code..."
          autocomplete="off"
          oninput="onSearchInput()"
          onkeydown="onSearchKey(event)" />
        <button class="search-go" onclick="doSearch()">🔍</button>
        <div class="suggestions hidden" id="suggestions"></div>
      </div>

      <button class="btn-gps" onclick="useGPS()">🛰️ Use My Current GPS Location</button>
    </div>

    <div class="divider"></div>

    <!-- Radius -->
    <div class="cfg-sec">
      <div class="cfg-label">🔵 Search Radius</div>
      <div class="chips" id="rc">
        <button class="chip" onclick="setR(2,this)">2 miles</button>
        <button class="chip r-on" onclick="setR(5,this)">5 miles</button>
        <button class="chip" onclick="setR(10,this)">10 miles</button>
        <button class="chip" onclick="setR(15,this)">15 miles</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Fuel -->
    <div class="cfg-sec">
      <div class="cfg-label">⛽ Fuel Type</div>
      <div class="chips" id="fc">
        <button class="chip f-on" onclick="setF('Regular Unleaded',this)">Regular</button>
        <button class="chip" onclick="setF('Midgrade',this)">Midgrade</button>
        <button class="chip" onclick="setF('Premium',this)">Premium</button>
        <button class="chip" onclick="setF('Diesel',this)">Diesel</button>
      </div>
    </div>

    <div class="divider"></div>

    <button class="btn btn-primary" id="search-btn" onclick="go()">⚡ Find Cheapest Gas Now</button>
  </div>

  <div class="refresh-bar hidden" id="rbar">
    <div class="ring-wrap">
      <svg viewBox="0 0 24 24" width="28" height="28">
        <circle class="ring-bg" cx="12" cy="12" r="11"/>
        <circle class="ring-prog" id="rprog" cx="12" cy="12" r="11"/>
      </svg>
    </div>
    <div class="refresh-info">Auto-refreshing in <span class="countdown" id="cd">5:00</span></div>
    <button class="btn-now" id="btn-now" onclick="go()">↺ Now</button>
  </div>

  <div id="results"></div>

  <div class="welcome" id="welcome">
    <div class="welcome-icon">⛽</div>
    <h2>Find Gas Anywhere in the US</h2>
    <p>Search any city, state or ZIP code above to find the cheapest gas prices near you.</p>
  </div>

</div>
<script>
  var PROXY = 'https://gasfinder-proxy.r90601871.workers.dev';
  var REFRESH = 300;
  var fuel = 'Regular Unleaded';
  var radius = 5;
  var busy = false, timer = null, secs = REFRESH;
  var currentLat = null, currentLng = null, currentLocationName = '', currentState = '';
  var searchTimeout = null;

  // ── Radius & Fuel ──
  function setR(r,el){radius=r;document.querySelectorAll('#rc .chip').forEach(function(c){c.classList.remove('r-on')});el.classList.add('r-on')}
  function setF(f,el){fuel=f;document.querySelectorAll('#fc .chip').forEach(function(c){c.classList.remove('f-on')});el.classList.add('f-on')}
  function cls(p,mn,mx){var r=(mx-mn)||.01,t=(p-mn)/r;return t<.33?'lo':t>.66?'hi':'mid'}

  // ── Location search ──
  function onSearchInput() {
    clearTimeout(searchTimeout);
    var val = document.getElementById('search-input').value.trim();
    if (val.length < 2) { hideSuggestions(); return; }
    searchTimeout = setTimeout(function() { fetchSuggestions(val); }, 350);
  }

  function onSearchKey(e) {
    if (e.key === 'Enter') { doSearch(); }
    if (e.key === 'Escape') { hideSuggestions(); }
  }

  function fetchSuggestions(query) {
    // Use Nominatim (OpenStreetMap) free geocoding - no key needed
    var url = 'https://nominatim.openstreetmap.org/search?format=json&countrycodes=us&limit=5&q=' + encodeURIComponent(query);
    fetch(url, { headers: { 'Accept-Language': 'en' } })
      .then(function(r){ return r.json(); })
      .then(function(data) { showSuggestions(data); })
      .catch(function(){ hideSuggestions(); });
  }

  function showSuggestions(data) {
    var box = document.getElementById('suggestions');
    if (!data || !data.length) { hideSuggestions(); return; }
    var html = '';
    for (var i = 0; i < Math.min(data.length, 5); i++) {
      var item = data[i];
      var parts = item.display_name.split(',');
      var main = parts[0].trim();
      var sub = parts.slice(1, 3).join(',').trim();
      html += '<div class="suggestion-item" onclick="selectLocation(' + item.lat + ',' + item.lon + ',\'' + escStr(item.display_name) + '\')">'
        + '<div class="suggestion-main">' + main + '</div>'
        + '<div class="suggestion-sub">' + sub + '</div>'
        + '</div>';
    }
    box.innerHTML = html;
    box.classList.remove('hidden');
  }

  function escStr(s) {
    return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  function hideSuggestions() {
    document.getElementById('suggestions').classList.add('hidden');
  }

  function doSearch() {
    var val = document.getElementById('search-input').value.trim();
    if (!val) return;
    fetchSuggestions(val);
  }

  function selectLocation(lat, lng, displayName) {
    currentLat = parseFloat(lat);
    currentLng = parseFloat(lng);
    var parts = displayName.split(',');
    currentLocationName = parts.slice(0, 2).join(',').trim();
    // Extract state for EIA lookup
    currentState = extractState(displayName);

    // Show active location
    document.getElementById('loc-active-name').textContent = currentLocationName;
    document.getElementById('loc-active-sub').textContent = 'Lat ' + currentLat.toFixed(4) + ' · Lng ' + currentLng.toFixed(4);
    document.getElementById('loc-active').classList.remove('hidden');
    document.getElementById('search-wrap').classList.add('hidden');
    hideSuggestions();
    document.getElementById('search-input').value = '';
  }

  function extractState(displayName) {
    var stateMap = {
      'Alabama':'AL','Alaska':'AK','Arizona':'AZ','Arkansas':'AR','California':'CA',
      'Colorado':'CO','Connecticut':'CT','Delaware':'DE','Florida':'FL','Georgia':'GA',
      'Hawaii':'HI','Idaho':'ID','Illinois':'IL','Indiana':'IN','Iowa':'IA',
      'Kansas':'KS','Kentucky':'KY','Louisiana':'LA','Maine':'ME','Maryland':'MD',
      'Massachusetts':'MA','Michigan':'MI','Minnesota':'MN','Mississippi':'MS',
      'Missouri':'MO','Montana':'MT','Nebraska':'NE','Nevada':'NV','New Hampshire':'NH',
      'New Jersey':'NJ','New Mexico':'NM','New York':'NY','North Carolina':'NC',
      'North Dakota':'ND','Ohio':'OH','Oklahoma':'OK','Oregon':'OR','Pennsylvania':'PA',
      'Rhode Island':'RI','South Carolina':'SC','South Dakota':'SD','Tennessee':'TN',
      'Texas':'TX','Utah':'UT','Vermont':'VT','Virginia':'VA','Washington':'WA',
      'West Virginia':'WV','Wisconsin':'WI','Wyoming':'WY','District of Columbia':'DC'
    };
    for (var state in stateMap) {
      if (displayName.indexOf(state) !== -1) return stateMap[state];
    }
    return 'MD'; // default
  }

  function clearLocation() {
    currentLat = null; currentLng = null; currentLocationName = ''; currentState = '';
    document.getElementById('loc-active').classList.add('hidden');
    document.getElementById('search-wrap').classList.remove('hidden');
    document.getElementById('results').innerHTML = '';
    document.getElementById('welcome').classList.remove('hidden');
    document.getElementById('rbar').classList.add('hidden');
    clearInterval(timer);
  }

  function useGPS() {
    if (!navigator.geolocation) { alert('GPS not supported by your browser.'); return; }
    var btn = document.querySelector('.btn-gps');
    btn.textContent = '📡 Detecting...';
    btn.disabled = true;
    navigator.geolocation.getCurrentPosition(function(pos) {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      // Reverse geocode
      var url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' + currentLat + '&lon=' + currentLng;
      fetch(url, { headers: { 'Accept-Language': 'en' } })
        .then(function(r){ return r.json(); })
        .then(function(data) {
          var city = (data.address && (data.address.city || data.address.town || data.address.county)) || 'Your Location';
          var state = (data.address && data.address.state) || '';
          currentLocationName = city + (state ? ', ' + state : '');
          currentState = extractState(state);
          document.getElementById('loc-active-name').textContent = currentLocationName;
          document.getElementById('loc-active-sub').textContent = 'Lat ' + currentLat.toFixed(4) + ' · Lng ' + currentLng.toFixed(4);
          document.getElementById('loc-active').classList.remove('hidden');
          document.getElementById('search-wrap').classList.add('hidden');
          btn.textContent = '🛰️ Use My Current GPS Location';
          btn.disabled = false;
        });
    }, function() {
      alert('Could not access GPS.');
      btn.textContent = '🛰️ Use My Current GPS Location';
      btn.disabled = false;
    });
  }

  // ── Timer ──
  function startTimer() {
    clearInterval(timer); secs = REFRESH;
    document.getElementById('rbar').classList.remove('hidden');
    document.getElementById('btn-now').disabled = false;
    tick();
    timer = setInterval(function() { secs--; tick(); if (secs <= 0) { secs = REFRESH; go(); } }, 1000);
  }
  function tick() {
    var m = Math.floor(secs/60), s = secs%60;
    document.getElementById('cd').textContent = m + ':' + (s<10?'0':'') + s;
    document.getElementById('rprog').style.strokeDashoffset = 69.1*(1-secs/REFRESH);
  }

  // ── Fetch ──
  async function go() {
    if (busy) return;
    if (!currentLat || !currentLng) {
      alert('Please search for a location first!');
      return;
    }
    busy = true; secs = REFRESH;
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('search-btn').disabled = true;
    var nb = document.getElementById('btn-now'); if (nb) nb.disabled = true;
    show('<div class="loading"><div class="spinner"></div><div class="loading-msg">Fetching live prices near ' + currentLocationName + '…</div></div>');

    try {
      var params = '?fuel=' + encodeURIComponent(fuel)
        + '&lat=' + currentLat
        + '&lng=' + currentLng
        + '&state=' + (currentState || 'MD')
        + '&location=' + encodeURIComponent(currentLocationName)
        + '&radius=' + radius;
      var res = await fetch(PROXY + '/prices' + params);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var json = await res.json();
      if (json.error) throw new Error(json.error);
      var stations = json.stations || [];
      if (!stations.length) throw new Error('No stations found');
      stations.sort(function(a,b){ return a.price - b.price; });
      render(stations, json.source);
      startTimer();
    } catch(e) {
      show('<div class="err">⚠️ ' + e.message + '</div>');
    }

    busy = false;
    document.getElementById('search-btn').disabled = false;
    if (nb) nb.disabled = false;
  }

  function show(html) { document.getElementById('results').innerHTML = html; }

  function render(st, source) {
    if (!st.length) { show('<div class="err">No stations found.</div>'); return; }
    var mn = st[0].price, mx = st[st.length-1].price;
    var avg = (st.reduce(function(a,s){return a+s.price;},0)/st.length).toFixed(3);
    var now = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    var b = st[0];

    var h = '<div class="summary">'
      + '<div class="scard"><div class="sval g">$' + mn.toFixed(3) + '</div><div class="slbl">Cheapest</div></div>'
      + '<div class="scard"><div class="sval">$' + avg + '</div><div class="slbl">Average</div></div>'
      + '<div class="scard"><div class="sval r">$' + mx.toFixed(3) + '</div><div class="slbl">Highest</div></div>'
      + '<div class="scard"><div class="sval">' + st.length + '</div><div class="slbl">Stations</div></div>'
      + '</div>'
      + '<div class="best">'
      + '<div class="best-badge">★ Best Deal</div>'
      + '<div class="best-name">' + b.name + '</div>'
      + '<div class="best-addr">' + b.address + '</div>'
      + '<div class="best-price-row"><div class="best-price">$' + b.price.toFixed(3) + '</div>'
      + '<div class="best-unit">' + fuel + ' · per gallon</div></div>'
      + '<div class="best-meta">'
      + '<span>📍 ' + b.distance.toFixed(1) + ' mi away</span>'
      + '<span>💰 Save $' + (mx-b.price).toFixed(3) + '/gal vs highest</span>'
      + '</div></div>'
      + '<div class="list-hdr"><div class="list-title">All Stations Ranked</div></div>'
      + '<div class="stations">';

    for (var i = 0; i < st.length; i++) {
      var s = st[i];
      h += '<div class="srow" style="animation-delay:' + (i*.04) + 's">'
        + '<div class="srank">#' + (i+1) + '</div>'
        + '<div class="sinfo">'
        + '<div class="sname">' + s.name + '</div>'
        + '<div class="saddr">' + s.address + '</div>'
        + '<div class="sdist">📍 ' + s.distance.toFixed(1) + ' mi</div>'
        + '</div>'
        + '<div class="sprice ' + cls(s.price,mn,mx) + '">$' + s.price.toFixed(3) + '</div>'
        + '</div>';
    }

    h += '</div><div class="foot-row"><span>Updated ' + now + ' · ' + currentLocationName + '</span>'
      + '<span class="src-tag">🏛️ US EIA Gov Data</span></div>';
    show(h);
  }

  // Close suggestions on outside click
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-wrap')) hideSuggestions();
  });
</script>
</body>
</html>
